name: Release to PyPI + Deploy to HuggingFace

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install build twine huggingface_hub

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Tag version: $TAG"

      - name: Update version in files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" ella_medical/__init__.py
          echo "Updated to $VERSION"

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Deploy to HuggingFace Space
        if: env.HF_TOKEN != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.upload_file(
              path_or_fileobj='app.py',
              path_in_repo='app.py',
              repo_id='Daniel2503/ella-medical',
              repo_type='space',
              commit_message='deploy: update app.py from CI'
          )
          print('Deployed to HuggingFace Space')
          "

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pyproject.toml ella_medical/__init__.py
          git commit -m "chore: release v${{ steps.version.outputs.version }}" || true
          git push
